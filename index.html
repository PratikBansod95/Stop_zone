<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a1628">
  <meta name="format-detection" content="telephone=no">
  <title>Strike Master</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a1628;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      padding:
        env(safe-area-inset-top, 0px)
        env(safe-area-inset-right, 0px)
        env(safe-area-inset-bottom, 0px)
        env(safe-area-inset-left, 0px);
    }

    #game-container canvas {
      display: block;
      touch-action: none;
    }
  </style>

  <!-- YouTube Playables SDK — MUST load before any game code -->
  <script src="https://www.youtube.com/game_api/v1"></script>
</head>
<body>
  <div id="game-container"></div>

  <script src="vendor/phaser.min.js"></script>
  <script src="src/theme.js"></script>
  <script src="src/layout.js"></script>
  <script src="src/YouTubeBridge.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/sounds.js"></script>
  <script src="src/fx.js"></script>
  <script src="src/sportsConfig.js"></script>
  <script src="src/sportsVisuals.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/BootScene.js"></script>
  <script src="src/MenuScene.js"></script>
  <script src="src/PlayScene.js"></script>
  <script src="src/GameOverScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
